<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#f5f5f5" stroke="#1976d2" stroke-width="3"/>
  
  <!-- Power meter display -->
  <rect x="48" y="60" width="160" height="140" rx="8" fill="#ffffff" stroke="#1976d2" stroke-width="2"/>
  
  <!-- Display screen -->
  <rect x="58" y="70" width="140" height="80" rx="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  
  <!-- Meter value text representation (3 bars) -->
  <rect x="70" y="85" width="8" height="35" rx="2" fill="#1976d2" opacity="0.6"/>
  <rect x="90" y="80" width="8" height="40" rx="2" fill="#1976d2" opacity="0.8"/>
  <rect x="110" y="75" width="8" height="45" rx="2" fill="#1976d2"/>
  <rect x="130" y="80" width="8" height="40" rx="2" fill="#1976d2" opacity="0.8"/>
  <rect x="150" y="85" width="8" height="35" rx="2" fill="#1976d2" opacity="0.6"/>
  
  <!-- Display label -->
  <text x="128" y="175" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1976d2">
    POWER
  </text>
  
  <!-- Power plug connection lines at bottom -->
  <line x1="95" y1="200" x2="95" y2="220" stroke="#1976d2" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="200" x2="128" y2="220" stroke="#1976d2" stroke-width="3" stroke-linecap="round"/>
  <line x1="161" y1="200" x2="161" y2="220" stroke="#1976d2" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Connection dots -->
  <circle cx="95" cy="220" r="3" fill="#1976d2"/>
  <circle cx="128" cy="220" r="3" fill="#1976d2"/>
  <circle cx="161" cy="220" r="3" fill="#1976d2"/>
</svg>
