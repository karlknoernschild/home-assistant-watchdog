            grid:
              show: true
              borderColor: var(--divider-color)
              strokeDashArray: 2
              padding:
                left: 4
                right: 10
                top: 8
                bottom: 0
              xaxis:
                lines:
                  show: false
              yaxis:
                lines:
                  show: true
            xaxis:
              type: datetime
              axisBorder:
                show: false
              axisTicks:
                show: false
              labels:
                show: true
                datetimeUTC: false
                hideOverlappingLabels: true
                rotate: 0
                style:
                  fontSize: 11px
                datetimeFormatter:
                  year: yyyy
                  month: MMM yyyy
                  day: MMM d
                  hour: h:mm TT
            tooltip:
              shared: true
              intersect: false
              theme: dark
              x:
                format: MMM d, h:mm TT
              "y":
                formatter: |
                  EVAL:function(value) {
                    return value.toFixed(0) + ' W';
                  }
            legend:
              show: false
            stroke:
              curve: stepline
              width: 2
              lineCap: round
            fill:
              type: solid
              opacity: 0.45
            markers:
              size: 0
              hover:
                size: 5
            dataLabels:
              enabled: false
          series:
            - entity: sensor.watchdog_l1_power
              name: L1
              color: "#2E8B57"
              type: area
              unit: W
              float_precision: 0
              extend_to: false
              opacity: 0.45
              show:
                in_header: true
                name_in_header: true
                legend_value: false
              group_by:
                duration: 3min
                func: avg
            - entity: sensor.watchdog_l2_power
              name: L2
              color: "#C97A00"
              type: area
              unit: W
              float_precision: 0
              extend_to: false
              opacity: 0.45
              show:
                in_header: true
                name_in_header: true
                legend_value: false
              group_by:
                duration: 3min
                func: avg
cards: []
