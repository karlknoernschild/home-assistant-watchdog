name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt

      # Run local-style hooks in CI so formatting/lint drift is caught early.
      - name: Pre-commit checks
        run: python -m pre_commit run --all-files

      - name: Compile integration
        run: python -m compileall custom_components/power_watchdog_wifi

      - name: Lint
        run: python -m ruff check custom_components/power_watchdog_wifi tests

      - name: Run tests
        run: pytest
