repos:
  # Generic repository hygiene checks and whitespace fixers.
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Ruff enforces import/order/lint rules and formatter consistency.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format

default_language_version:
  python: python3

files: ^(custom_components/|tests/|\.github/workflows/|README\.md|RELEASING\.md|CHANGELOG\.md|hacs\.json|pyrightconfig\.json|pytest\.ini|\.ruff\.toml|\.pre-commit-config\.yaml)$
